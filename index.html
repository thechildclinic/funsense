      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8; /* Softer thumb */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; /* Darker on hover */
      }

      .animate-fadeIn {
        animation: fadeIn 0.4s ease-in-out;
